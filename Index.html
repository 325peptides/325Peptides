<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>325 Peptides</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#0f1115;
color:white;
}

header{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#111,#1d2636);
}

header h1{
font-size:58px;
letter-spacing:4px;
}

header p{
margin-top:15px;
font-size:20px;
color:#bbb;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.card{
background:#181b22;
padding:35px;
border-radius:20px;
margin-bottom:30px;
}

h2{
margin-bottom:15px;
}

p{
line-height:1.8;
color:#d3d3d3;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:15px;
background:#252932;
border:none;
border-radius:12px;
color:white;
font-size:16px;
}

textarea{
height:160px;
resize:none;
}

button{
padding:15px;
background:#1b82ff;
color:white;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#006eff;
}

footer{
padding:40px;
text-align:center;
color:#888;
}

.social{
margin-top:20px;
font-size:18px;
}

.social a{
color:#58a6ff;
text-decoration:none;
display:block;
margin-top:10px;
}
</style>

</head>
<body>

<header>

<h1>325 PEPTIDES</h1>

<p>Research • Education • Contact</p>

</header>

<div class="container">

<div class="card">

<h2>About</h2>

<p>
Welcome to 325 Peptides. This website serves as a point of contact and provides general educational information about peptide research.
</p>

</div>

<div class="card">

<h2>Contact</h2>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

<div class="social">

<a href="https://instagram.com/325Peptides">Instagram</a>

<a href="https://t.me/325Peptides">Telegram</a>

</div>

</div>

</div>

<footer>

© 2026 325 Peptides

</footer>

</body>
</html>
